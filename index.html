<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeAxis - Custom Levels</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #003366;
            font-family: 'Segoe UI', Arial, sans-serif; color: white;
        }
        #game-wrapper {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #003366;
        }
        canvas {
            background-color: #005fa3;
            max-width: 100%; max-height: 100%;
            display: block; box-shadow: 0 0 50px rgba(0,0,0,0.6);
            cursor: crosshair;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0, 20, 40, 0.9); z-index: 10;
        }
        h1 { 
            font-size: 5rem; margin: 0 0 20px 0; 
            text-transform: uppercase; letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); font-weight: 900;
        }
        .btn {
            background: #ff6600; border: 4px solid #fff; color: white;
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer;
            margin: 8px; font-weight: bold; transition: all 0.2s;
            width: 300px; text-align: center; text-transform: uppercase;
        }
        .btn:hover { background: #ffffff; color: #ff6600; transform: scale(1.05); }
        .hidden { display: none !important; }
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .level-btn { width: 80px; height: 80px; font-size: 2rem; padding: 0; display: flex; align-items: center; justify-content: center;}

        .options-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 15px;
            border: 2px solid #fff; width: 440px; display: flex; flex-direction: column; gap: 20px;
        }
        .option-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }
        select, input[type="color"] { 
            background: #222; color: white; border: 2px solid #fff; 
            padding: 5px; cursor: pointer; font-family: inherit;
        }
        input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; accent-color: #ff6600; }

        #editor-ui {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px; z-index: 20;
            pointer-events: none;
        }
        .editor-panel {
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px;
            display: flex; gap: 10px; pointer-events: all; border: 2px solid #fff;
        }
        .tool-btn {
            background: #444; border: 2px solid #fff; color: white;
            padding: 10px; cursor: pointer; font-weight: bold;
        }
        .tool-btn.active { background: #ff6600; }
        .hint { position: absolute; bottom: 30px; opacity: 0.5; font-size: 0.9rem; }

        #download-level-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #fff;
            padding: 12px;
            cursor: pointer;
            z-index: 35;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            border-radius: 5px;
            transition: background 0.2s;
        }
        #download-level-btn:hover { background: #ff6600; }
        #download-level-btn svg { width: 28px; height: 28px; stroke: white; fill: none; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <div id="editor-ui" class="hidden">
        <div class="editor-panel">
            <button class="tool-btn active" id="tool-b" onclick="setTool('b')">BLOCK</button>
            <button class="tool-btn" id="tool-s" onclick="setTool('s')">THORN</button>
            <button class="tool-btn" id="tool-f" onclick="setTool('f')" style="color: #00e5ff;">FLIP TOOL</button>
            <div style="width:2px; background:#fff; margin:0 10px;"></div>
            <button class="tool-btn" onclick="moveEditorCamera(-5)"> < SCROLL</button>
            <button class="tool-btn" onclick="moveEditorCamera(5)">SCROLL > </button>
            <div style="width:2px; background:#fff; margin:0 10px;"></div>
            <button class="tool-btn" style="background:#28a745" onclick="playCustomLevel()">SAVE & PLAY</button>
            <button class="tool-btn" style="background:#dc3545" onclick="showMain()">EXIT</button>
        </div>

        <div id="download-level-btn" onclick="downloadLevelData()" title="Download Level JSON">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="12" y1="18" x2="12" y2="12"></line>
                <polyline points="9 15 12 18 15 15"></polyline>
            </svg>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <h1>CubeAxis</h1>
        <div class="btn" onclick="goFullscreenAndMenu()">Play Game</div>
        <div class="btn" onclick="enterEditor()">Create Levels</div>
        <div class="btn" style="background: #555;" onclick="showOptions()">Options</div>
        <p class="hint">SPACE to Jump • CLICK to Place/Flip in Editor • ESC to Exit Fullscreen</p>
    </div>

    <div id="options-menu" class="overlay hidden">
        <h1>Options</h1>
        <div class="options-box">
            <div class="option-row">
                <label>Cube Skin</label>
                <select id="opt-skin" onchange="updateSettings()">
                    <option value="classic">Classic</option>
                    <option value="chess">Chess Board</option>
                    <option value="target">Target</option>
                    <option value="creeper">Explorer</option>
                    <option value="window">Window</option>
                </select>
            </div>
            <div class="option-row">
                <label>Better Frames</label>
                <input type="checkbox" id="opt-frames" onchange="updateSettings()">
            </div>
            <div class="option-row">
                <label>Cube Color</label>
                <input type="color" id="opt-cube-color" value="#ff6600" onchange="updateSettings()">
            </div>
            <div class="option-row">
                <label>Sky Color</label>
                <input type="color" id="opt-sky-color" value="#005fa3" onchange="updateSettings()">
            </div>
        </div>
        <div class="btn" style="margin-top: 20px;" onclick="showMain()">Back</div>
    </div>

    <div id="level-menu" class="overlay hidden">
        <h1>Select Level</h1>
        <div class="level-grid">
            <div class="btn level-btn" onclick="startGame(0)">1</div>
            <div class="btn level-btn" onclick="startGame(1)">2</div>
            <div class="btn level-btn" onclick="startGame(2)">3</div>
        </div>
        <div class="btn" style="width: 200px; margin-top: 40px; background: #444;" onclick="showMain()">Back</div>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 id="status-text">Crashed!</h1>
        <div class="btn" onclick="retryLevel()">Retry</div>
        <div class="btn" style="background: #444;" onclick="showLevels()">Menu</div>
    </div>
</div>

    const savedLevel = localStorage.getItem('cubeaxis_custom');
    if(savedLevel) customLevel = JSON.parse(savedLevel);

    function updateSettings() {
        settings.betterFrames = document.getElementById('opt-frames').checked;
        settings.cubeColor = document.getElementById('opt-cube-color').value;
        settings.skyColor = document.getElementById('opt-sky-color').value;
        settings.skin = document.getElementById('opt-skin').value;
        localStorage.setItem('cubeaxis_settings', JSON.stringify(settings));
    }

    function goFullscreenAndMenu() {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        showLevels();
    }

    function showLevels() { hideAll(); document.getElementById('level-menu').classList.remove('hidden'); gameState = 'LEVELS'; }
    function showMain() { hideAll(); document.getElementById('main-menu').classList.remove('hidden'); gameState = 'MENU'; }
    function showOptions() { hideAll(); document.getElementById('options-menu').classList.remove('hidden'); gameState = 'OPTIONS'; }

    function enterEditor() {
        hideAll();
        document.getElementById('editor-ui').classList.remove('hidden');
        gameState = 'EDITOR';
        editorCameraX = 0;
    }

    function hideAll() {
        document.querySelectorAll('.overlay, #editor-ui').forEach(el => el.classList.add('hidden'));
    }

    function setTool(t) {
        currentTool = t;
        document.getElementById('tool-b').classList.toggle('active', t === 'b');
        document.getElementById('tool-s').classList.toggle('active', t === 's');
        document.getElementById('tool-f').classList.toggle('active', t === 'f');
    }

    function moveEditorCamera(dir) {
        editorCameraX += dir * UNIT;
        if(editorCameraX < 0) editorCameraX = 0;
    }

    function playCustomLevel() {
        localStorage.setItem('cubeaxis_custom', JSON.stringify(customLevel));
        obstacles = [...customLevel].sort((a, b) => a.x - b.x);
        if(obstacles.length === 0) return alert("Add some objects first!");
        hideAll();
        resetPlayer();
        gameState = 'PLAYING';
    }

    function startGame(idx) {
        obstacles = levels[idx];
        hideAll();
        resetPlayer();
        gameState = 'PLAYING';
    }

    function retryLevel() {
        hideAll();
        resetPlayer();
        gameState = 'PLAYING';
    }

    function resetPlayer() {
        player.x = 200;
        player.y = GROUND_Y - UNIT;
        player.vy = 0;
        player.rotation = 0;
        player.onGround = true;
        cameraX = 0;
        jumpRequested = false;
        trail = [];
    }

    function downloadLevelData() {
        if (customLevel.length === 0) return alert("Editor is empty!");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(customLevel));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "cubeaxis_level.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    window.addEventListener('keydown', e => {
        if ((e.code === 'Space' || e.code === 'ArrowUp')) requestJump();
    });

    canvas.addEventListener('mousedown', e => {
        if (gameState === 'PLAYING') {
            requestJump();
        } else if (gameState === 'EDITOR') {
            handleEditorClick(e);
        }
    });

    function requestJump() {
        if (gameState !== 'PLAYING') return;
        jumpRequested = true;
        jumpBufferTime = Date.now();
    }

    function handleEditorClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX + editorCameraX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const gridX = Math.floor((mouseX - 600) / UNIT);
        const gridY = Math.floor((GROUND_Y - mouseY) / UNIT);

        if (gridX < 0 || gridY < 0 || gridY > 8) return;

        const existingIdx = customLevel.findIndex(o => Math.floor(o.x) === gridX && o.y === gridY);
        
        if (currentTool === 'f') {
            if (existingIdx > -1) {
                customLevel[existingIdx].f = !customLevel[existingIdx].f;
            }
        } else {
            if (existingIdx > -1) {
                customLevel.splice(existingIdx, 1);
            } else {
                customLevel.push({t: currentTool, x: gridX, y: gridY, f: false});
            }
        }
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        if (Date.now() - jumpBufferTime > JUMP_BUFFER_MS) jumpRequested = false;

        player.x += SPEED;
        cameraX = player.x - 350;
        player.vy += GRAVITY;
        player.y += player.vy;

        let standing = false;

        if (player.y >= GROUND_Y - UNIT) {
            player.y = GROUND_Y - UNIT;
            player.vy = 0;
            standing = true;
        }

        for (const obj of obstacles) {
            const ox = obj.x * UNIT + 600;
            const oy = GROUND_Y - (obj.y + 1) * UNIT;

            if (player.x + UNIT > ox + 8 && player.x < ox + UNIT - 8) {
                if (obj.t === 's') {
                    const hitMarginX = 14; 
                    if (player.x + UNIT > ox + hitMarginX && player.x < ox + UNIT - hitMarginX) {
                        if (player.y + UNIT > oy + 18 && player.y < oy + UNIT - 18) {
                            return gameOver();
                        }
                    }
                } else {
                    if (!obj.f) {
                        if (player.vy >= 0 && player.y + UNIT >= oy && player.y + UNIT <= oy + 28) {
                            player.y = oy - UNIT; 
                            player.vy = 0; 
                            standing = true;
                        } else if (player.y + UNIT > oy + 8 && player.y < oy + UNIT - 8) {
                            return gameOver();
                        }
                    } else {
                        if (player.vy < 0 && player.y <= oy + UNIT && player.y >= oy + UNIT - 20) {
                            player.y = oy + UNIT;
                            player.vy = 0;
                        } else if (player.y + UNIT > oy + 8 && player.y < oy + UNIT - 8) {
                            return gameOver();
                        }
                    }
                }
            }
        }

        player.onGround = standing;

        if (jumpRequested && player.onGround) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
            jumpRequested = false;
        }

        if (!player.onGround) {
            player.rotation += 0.16;
        } else {
            player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
        }

        if(settings.betterFrames) {
            trail.push({x: player.x, y: player.y, r: player.rotation});
            if(trail.length > 5) trail.shift();
        } else {
            trail = [];
        }

        const lastX = (obstacles[obstacles.length-1]?.x * UNIT || 0) + 1500;
        if (player.x > lastX) victory();
    }

    function drawPlayerIcon(x, y, rotation, alpha = 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(x + UNIT/2, y + UNIT/2);
        ctx.rotate(rotation);
        
        const half = -UNIT/2;
        const color = settings.cubeColor;

        ctx.fillStyle = color;
        ctx.fillRect(half, half, UNIT, UNIT);

        // Skin Overlays
        if (settings.skin === 'chess') {
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.fillRect(half, half, UNIT/2, UNIT/2);
            ctx.fillRect(half + UNIT/2, half + UNIT/2, UNIT/2, UNIT/2);
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(half + UNIT/2, half, UNIT/2, UNIT/2);
            ctx.fillRect(half, half + UNIT/2, UNIT/2, UNIT/2);
        } else if (settings.skin === 'target') {
            ctx.strokeStyle = "white";
            ctx.lineWidth = 4;
            ctx.strokeRect(half + 12, half + 12, UNIT - 24, UNIT - 24);
            ctx.fillStyle = "white";
            ctx.fillRect(half + 24, half + 24, UNIT - 48, UNIT - 48);
        } else if (settings.skin === 'creeper') {
            ctx.fillStyle = "black";
            ctx.fillRect(half + 12, half + 12, 12, 12); // Eye L
            ctx.fillRect(half + UNIT - 24, half + 12, 12, 12); // Eye R
            ctx.fillRect(half + 20, half + 30, 24, 24); // Mouth
        } else if (settings.skin === 'window') {
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.lineWidth = 4;
            ctx.strokeRect(half + 4, half + 4, UNIT-8, UNIT-8);
            ctx.beginPath();
            ctx.moveTo(half + UNIT/2, half + 4); ctx.lineTo(half + UNIT/2, half + UNIT - 4);
            ctx.moveTo(half + 4, half + UNIT/2); ctx.lineTo(half + UNIT - 4, half + UNIT/2);
            ctx.stroke();
        }

        ctx.strokeStyle = "white"; 
        ctx.lineWidth = 4; 
        ctx.strokeRect(half, half, UNIT, UNIT);
        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = settings.skyColor; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const activeCameraX = (gameState === 'EDITOR') ? editorCameraX : cameraX;

        ctx.save();
        ctx.translate(-activeCameraX, 0);

        if (gameState === 'EDITOR') {
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<5000; i+=UNIT) ctx.strokeRect(i + 600, 0, UNIT, GROUND_Y);
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fillRect(activeCameraX, GROUND_Y, canvas.width, 4);

        const listToDraw = (gameState === 'EDITOR') ? customLevel : obstacles;
        listToDraw.forEach(obj => {
            const ox = obj.x * UNIT + 600;
            const oy = GROUND_Y - (obj.y + 1) * UNIT;
            
            ctx.save();
            if (obj.f) {
                ctx.translate(ox + UNIT/2, oy + UNIT/2);
                ctx.scale(1, -1);
                ctx.translate(-(ox + UNIT/2), -(oy + UNIT/2));
            }

            if (obj.t === 'b') {
                ctx.fillStyle = "black";
                ctx.fillRect(ox, oy, UNIT, UNIT);
                ctx.strokeStyle = "rgba(255,255,255,0.8)";
                ctx.strokeRect(ox + 2, oy + 2, UNIT - 4, UNIT - 4);
            } else {
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.moveTo(ox, oy + UNIT); 
                ctx.lineTo(ox + UNIT, oy + UNIT); 
                ctx.lineTo(ox + UNIT/2, oy);
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        });

        if (gameState !== 'EDITOR') {
            trail.forEach((t, i) => drawPlayerIcon(t.x, t.y, t.r, i / 10));
            drawPlayerIcon(player.x, player.y, player.rotation);
        }

        ctx.restore();
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        document.getElementById('status-text').innerText = "Crashed!";
        document.getElementById('game-over').classList.remove('hidden');
    }

    function victory() {
        gameState = 'GAMEOVER';
        document.getElementById('status-text').innerText = "Level Complete!";
        document.getElementById('game-over').classList.remove('hidden');
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
