<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeAxis</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #003366;
            font-family: 'Segoe UI', Arial, sans-serif; color: white;
        }
        #game-wrapper {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #003366;
        }
        canvas {
            background-color: #005fa3;
            max-width: 100%; max-height: 100%;
            display: block; box-shadow: 0 0 50px rgba(0,0,0,0.6);
            cursor: crosshair;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0, 20, 40, 0.9); z-index: 10;
        }
        h1 { 
            font-size: 6rem; margin: 0 0 20px 0; 
            text-transform: uppercase; letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); font-weight: 900;
        }
        .btn {
            background: #ff6600; border: 4px solid #fff; color: white;
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer;
            margin: 8px; font-weight: bold; transition: all 0.2s;
            width: 300px; text-align: center; text-transform: uppercase;
        }
        .btn:hover { background: #ffffff; color: #ff6600; transform: scale(1.05); }
        .hidden { display: none !important; }
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .level-btn { width: 80px; height: 80px; font-size: 2rem; padding: 0; display: flex; align-items: center; justify-content: center;}

        /* Editor Specific UI */
        #editor-ui {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px; z-index: 20;
            pointer-events: none;
        }
        .editor-panel {
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px;
            display: flex; gap: 10px; pointer-events: all; border: 2px solid #fff;
        }
        .tool-btn {
            background: #444; border: 2px solid #fff; color: white;
            padding: 10px; cursor: pointer; font-weight: bold;
        }
        .tool-btn.active { background: #ff6600; }
        .hint { position: absolute; bottom: 30px; opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <div id="editor-ui" class="hidden">
        <div class="editor-panel">
            <button class="tool-btn active" id="tool-b" onclick="setTool('b')">BLOCK</button>
            <button class="tool-btn" id="tool-s" onclick="setTool('s')">THORN</button>
            <div style="width:2px; background:#fff; margin:0 10px;"></div>
            <button class="tool-btn" onclick="moveEditorCamera(-5)"> < SCROLL</button>
            <button class="tool-btn" onclick="moveEditorCamera(5)">SCROLL > </button>
            <div style="width:2px; background:#fff; margin:0 10px;"></div>
            <button class="tool-btn" style="background:#28a745" onclick="playCustomLevel()">SAVE & PLAY</button>
            <button class="tool-btn" style="background:#dc3545" onclick="showMain()">EXIT</button>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <h1>CubeAxis</h1>
        <div class="btn" onclick="goFullscreenAndMenu()">Play Game</div>
        <div class="btn" onclick="enterEditor()">Create Levels</div>
        <p class="hint">SPACE to Jump • CLICK to Place in Editor • ESC to Exit Fullscreen</p>
    </div>

    <div id="level-menu" class="overlay hidden">
        <h1>Select Level</h1>
        <div class="level-grid">
            <div class="btn level-btn" onclick="startGame(0)">1</div>
            <div class="btn level-btn" onclick="startGame(1)">2</div>
            <div class="btn level-btn" onclick="startGame(2)">3</div>
        </div>
        <div class="btn" style="width: 200px; margin-top: 40px; background: #444;" onclick="showMain()">Back</div>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 id="status-text">Crashed!</h1>
        <div class="btn" onclick="retryLevel()">Retry</div>
        <div class="btn" style="background: #444;" onclick="showLevels()">Menu</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const UNIT = 64; 
    const GRAVITY = 1.15;
    const JUMP_FORCE = -18.5;
    const SPEED = 9.5;
    const GROUND_Y = 600;

    let gameState = 'MENU';
    let currentLevelIdx = 0;
    let cameraX = 0;
    let player = { x: 200, y: 0, vy: 0, rotation: 0, onGround: false };
    let obstacles = [];
    
    // Improved Input Handling
    let jumpRequested = false;
    let jumpBufferTime = 0;
    const JUMP_BUFFER_MS = 150; // How long to "remember" a jump press

    let editorCameraX = 0;
    let currentTool = 'b';
    let customLevel = [];

    const levels = [
        [ // Level 1
            {t:'s', x:15, y:0}, {t:'s', x:25, y:0}, {t:'b', x:35, y:0}, {t:'b', x:36, y:0}, {t:'b', x:37, y:0},
            {t:'b', x:45, y:0}, {t:'b', x:46, y:1}, {t:'b', x:47, y:2}, {t:'s', x:58, y:0}, 
            {t:'b', x:70, y:0}, {t:'b', x:71, y:0}, {t:'s', x:70.5, y:1} 
        ],
        [ // Level 2 (RE-DESIGNED FOR FAIRNESS)
            {t:'b', x:10, y:0}, {t:'b', x:14, y:1}, {t:'b', x:18, y:2}, 
            {t:'s', x:28, y:0}, {t:'b', x:35, y:1}, {t:'b', x:36, y:1},
            {t:'b', x:44, y:0}, {t:'b', x:45, y:0}, 
            {t:'b', x:54, y:1}, {t:'b', x:55, y:1}, {t:'s', x:54.5, y:2} // Spaced out final jump
        ],
        [ // Level 3
            {t:'s', x:10, y:0}, {t:'b', x:16, y:1}, {t:'b', x:25, y:0}, {t:'b', x:28, y:2}, {t:'s', x:39, y:0}, {t:'s', x:65, y:0}
        ]
    ];

    const savedLevel = localStorage.getItem('cubeaxis_custom');
    if(savedLevel) customLevel = JSON.parse(savedLevel);

    function goFullscreenAndMenu() {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        showLevels();
    }

    function showLevels() {
        hideAll();
        document.getElementById('level-menu').classList.remove('hidden');
        gameState = 'LEVELS';
    }

    function showMain() {
        hideAll();
        document.getElementById('main-menu').classList.remove('hidden');
        gameState = 'MENU';
    }

    function enterEditor() {
        hideAll();
        document.getElementById('editor-ui').classList.remove('hidden');
        gameState = 'EDITOR';
        editorCameraX = 0;
    }

    function hideAll() {
        document.querySelectorAll('.overlay, #editor-ui').forEach(el => el.classList.add('hidden'));
    }

    function setTool(t) {
        currentTool = t;
        document.getElementById('tool-b').classList.toggle('active', t === 'b');
        document.getElementById('tool-s').classList.toggle('active', t === 's');
    }

    function moveEditorCamera(dir) {
        editorCameraX += dir * UNIT;
        if(editorCameraX < 0) editorCameraX = 0;
    }

    function playCustomLevel() {
        localStorage.setItem('cubeaxis_custom', JSON.stringify(customLevel));
        obstacles = [...customLevel].sort((a, b) => a.x - b.x);
        if(obstacles.length === 0) return alert("Add some objects first!");
        hideAll();
        resetPlayer();
        gameState = 'PLAYING';
    }

    function startGame(idx) {
        currentLevelIdx = idx;
        obstacles = levels[idx];
        hideAll();
        resetPlayer();
        gameState = 'PLAYING';
    }

    function retryLevel() {
        hideAll();
        resetPlayer();
        gameState = 'PLAYING';
    }

    function resetPlayer() {
        player.x = 200;
        player.y = GROUND_Y - UNIT;
        player.vy = 0;
        player.rotation = 0;
        player.onGround = true;
        cameraX = 0;
        jumpRequested = false;
    }

    window.addEventListener('keydown', e => {
        if ((e.code === 'Space' || e.code === 'ArrowUp')) requestJump();
    });

    canvas.addEventListener('mousedown', e => {
        if (gameState === 'PLAYING') {
            requestJump();
        } else if (gameState === 'EDITOR') {
            handleEditorClick(e);
        }
    });

    function requestJump() {
        if (gameState !== 'PLAYING') return;
        jumpRequested = true;
        jumpBufferTime = Date.now();
    }

    function handleEditorClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX + editorCameraX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const gridX = Math.floor((mouseX - 600) / UNIT);
        const gridY = Math.floor((GROUND_Y - mouseY) / UNIT);

        if (gridX < 0 || gridY < 0 || gridY > 8) return;

        const existingIdx = customLevel.findIndex(o => Math.floor(o.x) === gridX && o.y === gridY);
        if (existingIdx > -1) {
            customLevel.splice(existingIdx, 1);
        } else {
            customLevel.push({t: currentTool, x: gridX, y: gridY});
        }
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        // Clear jump buffer if too old
        if (Date.now() - jumpBufferTime > JUMP_BUFFER_MS) {
            jumpRequested = false;
        }

        player.x += SPEED;
        cameraX = player.x - 350;
        player.vy += GRAVITY;
        player.y += player.vy;

        let standing = false;

        // Ground Physics
        if (player.y >= GROUND_Y - UNIT) {
            player.y = GROUND_Y - UNIT;
            player.vy = 0;
            standing = true;
        }

        // Object Physics
        for (const obj of obstacles) {
            const ox = obj.x * UNIT + 600;
            const oy = GROUND_Y - (obj.y + 1) * UNIT;

            // X-Axis check
            if (player.x + UNIT > ox + 12 && player.x < ox + UNIT - 12) {
                if (obj.t === 's') {
                    // Thorn Collision
                    if (player.y + UNIT > oy + 15) return gameOver();
                } else {
                    // Block Collision
                    // 1. Landing (Check if falling and feet are near the top)
                    if (player.vy >= 0 && player.y + UNIT >= oy && player.y + UNIT <= oy + 28) {
                        player.y = oy - UNIT; 
                        player.vy = 0; 
                        standing = true;
                    } 
                    // 2. Side/Bottom Crash
                    else if (player.y + UNIT > oy + 8 && player.y < oy + UNIT - 2) {
                        return gameOver();
                    }
                }
            }
        }

        player.onGround = standing;

        // Execute Buffered Jump
        if (jumpRequested && player.onGround) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
            jumpRequested = false;
        }

        // Rotation
        if (!player.onGround) {
            player.rotation += 0.16;
        } else {
            player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
        }

        const lastX = (obstacles[obstacles.length-1]?.x * UNIT || 0) + 1500;
        if (player.x > lastX) victory();
    }

    function draw() {
        ctx.fillStyle = "#005fa3"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const activeCameraX = (gameState === 'EDITOR') ? editorCameraX : cameraX;

        ctx.save();
        ctx.translate(-activeCameraX, 0);

        if (gameState === 'EDITOR') {
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<5000; i+=UNIT) ctx.strokeRect(i + 600, 0, UNIT, GROUND_Y);
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fillRect(activeCameraX, GROUND_Y, canvas.width, 4);

        const listToDraw = (gameState === 'EDITOR') ? customLevel : obstacles;
        listToDraw.forEach(obj => {
            const ox = obj.x * UNIT + 600;
            const oy = GROUND_Y - (obj.y + 1) * UNIT;
            if (obj.t === 'b') {
                ctx.fillStyle = "black";
                ctx.fillRect(ox, oy, UNIT, UNIT);
                ctx.strokeStyle = "rgba(255,255,255,0.8)";
                ctx.strokeRect(ox + 2, oy + 2, UNIT - 4, UNIT - 4);
            } else {
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.moveTo(ox, oy + UNIT); ctx.lineTo(ox + UNIT, oy + UNIT); ctx.lineTo(ox + UNIT/2, oy);
                ctx.closePath(); ctx.fill();
            }
        });

        if (gameState !== 'EDITOR') {
            ctx.save();
            ctx.translate(player.x + UNIT/2, player.y + UNIT/2);
            ctx.rotate(player.rotation);
            ctx.fillStyle = "#ff6600";
            ctx.fillRect(-UNIT/2, -UNIT/2, UNIT, UNIT);
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.strokeRect(-UNIT/2, -UNIT/2, UNIT, UNIT);
            ctx.restore();
        }

        ctx.restore();
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        document.getElementById('status-text').innerText = "Crashed!";
        document.getElementById('game-over').classList.remove('hidden');
    }

    function victory() {
        gameState = 'GAMEOVER';
        document.getElementById('status-text').innerText = "Level Complete!";
        document.getElementById('game-over').classList.remove('hidden');
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>```
